<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCST - 即時字幕</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --text-primary: #f5f5f5;
            --accent-gold: #d4af37;
            --font-display: 'Playfair Display', serif;
            --font-body: 'Noto Sans SC', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: var(--font-display);
            font-size: 1.25rem;
            color: var(--accent-gold);
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .status { font-size: 0.75rem; color: #666; }
        .status.live { color: #4ade80; }
        .status.processing { color: #f59e0b; }
        .demo-btn {
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-family: var(--font-body);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .demo-btn:hover { background: rgba(212, 175, 55, 0.1); }
        .demo-btn.active { background: var(--accent-gold); color: var(--bg-primary); }
        .demo-btn.loading { opacity: 0.5; cursor: not-allowed; }
        .caption-container {
            flex: 1;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: stretch;
            padding: 2rem;
            gap: 2rem;
            height: calc(100vh - 80px);
        }
        .caption-box {
            flex: 1;
            max-width: 50%;
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 2rem;
            border-top: 2px solid var(--accent-gold);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .caption-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--accent-gold);
            margin-bottom: 0.75rem;
            flex-shrink: 0;
        }
        .caption-history {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .caption-entry {
            font-size: 1.5rem;
            line-height: 1.4;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .caption-entry.fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Hidden audio elements */
        #audioPlayer { display: none; }
        #hiddenAudio { display: none; }
        .debug-info {
            position: fixed;
            bottom: 1rem;
            left: 1rem;
            font-size: 0.65rem;
            color: #444;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">RCST</div>
        <div class="header-right">
            <div class="status" id="status">Ready</div>
            <button class="demo-btn" id="demoBtn">Demo Mode</button>
        </div>
    </header>

    <!-- Hidden audio player for NPR stream -->
    <audio id="audioPlayer" controls></audio>
    <!-- Hidden audio for audio context -->
    <audio id="hiddenAudio" crossorigin="anonymous"></audio>

    <main class="caption-container">
        <div class="caption-box">
            <div class="caption-label">English</div>
            <div class="caption-history" id="enHistory"></div>
        </div>
        <div class="caption-box">
            <div class="caption-label">中文翻譯</div>
            <div class="caption-history" id="zhHistory"></div>
        </div>
    </main>

    <div class="debug-info" id="debugInfo"></div>

    <script>
        const NPR_STREAM_URL = '/proxy/npr';
        const enHistory = document.getElementById('enHistory');
        const zhHistory = document.getElementById('zhHistory');
        const status = document.getElementById('status');
        const demoBtn = document.getElementById('demoBtn');
        const audioPlayer = document.getElementById('audioPlayer');
        let hiddenAudio = document.getElementById('hiddenAudio');
        const debugInfo = document.getElementById('debugInfo');

        let eventSource = null;
        let currentMode = 'demo'; // 'demo' or 'live'
        let audioContext = null;
        let processor = null;
        let sourceNode = null;
        let mediaStream = null;
        let isProcessing = false;
        let audioBuffer = [];

        const SAMPLE_RATE = 16000;
        const CHUNK_DURATION_MS = 3000;
        const CHUNK_SIZE = Math.floor(SAMPLE_RATE * CHUNK_DURATION_MS / 1000);

        function updateDebug(msg) {
            debugInfo.textContent = msg;
        }

        function prependCaption(historyEl, text) {
            const entry = document.createElement('div');
            entry.className = 'caption-entry fade-in';
            entry.textContent = text;
            historyEl.prepend(entry);
            historyEl.scrollTop = 0;
        }

        function addCaptions(en, zh) {
            if (en) prependCaption(enHistory, en);
            if (zh) prependCaption(zhHistory, zh);
        }

        // Connect to demo SSE
        function connectDemoSSE() {
            if (eventSource) {
                eventSource.close();
            }

            status.textContent = 'Demo Mode';
            demoBtn.classList.add('loading');

            eventSource = new EventSource('/stream');

            eventSource.addEventListener('caption', (event) => {
                const data = JSON.parse(event.data);
                addCaptions(data.en, data.zh);
                status.textContent = 'Demo Mode';
                status.classList.add('live');
                demoBtn.classList.remove('loading');
            });

            eventSource.onerror = () => {
                status.textContent = 'Reconnecting...';
                demoBtn.classList.add('loading');
                setTimeout(connectDemoSSE, 3000);
            };
        }

        // Start live NPR mode with audio capture using Web Audio API
        async function startLiveMode() {
            try {
                // Create audio context
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });

                // Create script processor for audio capture
                processor = audioContext.createScriptProcessor(4096, 1, 1);

                audioBuffer = [];
                let audioStartTime = null;

                processor.onaudioprocess = (e) => {
                    if (currentMode !== 'live' || isProcessing) return;

                    const inputData = e.inputBuffer.getChannelData(0);

                    // Calculate audio level for debugging
                    let sum = 0;
                    for (let i = 0; i < inputData.length; i++) {
                        sum += Math.abs(inputData[i]);
                    }
                    const avgLevel = sum / inputData.length;

                    if (!audioStartTime && avgLevel > 0.001) {
                        audioStartTime = Date.now();
                        console.log('Audio captured! Level:', avgLevel.toFixed(4));
                        updateDebug('检测到音频输入! 音量: ' + (avgLevel * 100).toFixed(1) + '%');
                    }

                    // Convert float32 to int16 PCM and add to buffer
                    for (let i = 0; i < inputData.length; i++) {
                        audioBuffer.push(inputData[i]);
                    }

                    // When we have enough samples, send to backend
                    if (audioBuffer.length >= CHUNK_SIZE) {
                        const chunk = audioBuffer.slice(0, CHUNK_SIZE);
                        audioBuffer = audioBuffer.slice(CHUNK_SIZE);

                        if (avgLevel > 0.001) {
                            updateDebug('发送音频块... 音量: ' + (avgLevel * 100).toFixed(1) + '%');
                        }
                        sendAudioChunk(chunk);
                    }
                };

                // Connect processor to destination for monitoring
                processor.connect(audioContext.destination);

                // Create audio element for NPR stream
                hiddenAudio = document.getElementById('hiddenAudio');
                hiddenAudio.src = NPR_STREAM_URL;
                hiddenAudio.loop = true;

                // Add error handling
                hiddenAudio.onerror = (e) => {
                    console.error('Audio element error:', e);
                    updateDebug('音频加载失败: ' + JSON.stringify(e));
                };

                // Wait for audio to be loadable
                await new Promise((resolve, reject) => {
                    hiddenAudio.oncanplaythrough = () => {
                        console.log('Audio can play through');
                        updateDebug('音频已加载，可以播放');
                        resolve();
                    };
                    hiddenAudio.onerror = (e) => {
                        console.error('Audio load error:', e);
                        reject(new Error('音频加载失败'));
                    };
                    hiddenAudio.load();
                });

                // Create media element source and connect to processor
                const mediaSource = audioContext.createMediaElementSource(hiddenAudio);
                mediaSource.connect(processor);

                // Start playing NPR stream
                try {
                    await hiddenAudio.play();
                    console.log('NPR audio started playing');

                    // Resume audio context (required for autoplay policy)
                    if (audioContext.state === 'suspended') {
                        await audioContext.resume();
                        console.log('AudioContext resumed');
                    }

                    setTimeout(() => {
                        if (hiddenAudio.paused) {
                            updateDebug('警告: 音频可能没有播放(自动播放策略限制)');
                        } else {
                            updateDebug('音频正在播放，检测中...');
                        }
                    }, 1000);

                } catch (playError) {
                    console.error('Failed to play audio:', playError);
                    updateDebug('播放错误: ' + playError.message);
                    throw playError;
                }

                currentMode = 'live';
                demoBtn.classList.add('active');
                demoBtn.textContent = 'Live: NPR';
                status.textContent = 'Live: NPR';
                status.classList.add('live');
                status.classList.remove('processing');
                demoBtn.classList.remove('loading');

            } catch (error) {
                console.error('Failed to start live mode:', error);
                status.textContent = 'Error: ' + error.message;
                demoBtn.classList.remove('loading');
                currentMode = 'demo';
                demoBtn.classList.remove('active');
                demoBtn.textContent = 'Demo Mode';
            }
        }

        // Start microphone mode
        async function startMicMode() {
            try {
                // Request microphone - flexible constraints
                const constraints = {
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true
                    }
                };

                mediaStream = await navigator.mediaDevices.getUserMedia(constraints);

                // Create audio context - let it use default sample rate
                audioContext = new AudioContext();

                // Create script processor for mic capture
                processor = audioContext.createScriptProcessor(4096, 1, 1);

                audioBuffer = [];

                processor.onaudioprocess = (e) => {
                    if (currentMode !== 'live') return;

                    const inputData = e.inputBuffer.getChannelData(0);

                    // Calculate audio level
                    let sum = 0;
                    for (let i = 0; i < inputData.length; i++) {
                        sum += Math.abs(inputData[i]);
                    }
                    const avgLevel = sum / inputData.length;

                    if (avgLevel > 0.001) {
                        updateDebug('麦克风输入! 音量: ' + (avgLevel * 100).toFixed(1) + '%');
                    }

                    for (let i = 0; i < inputData.length; i++) {
                        audioBuffer.push(inputData[i]);
                    }

                    if (audioBuffer.length >= CHUNK_SIZE) {
                        const chunk = audioBuffer.slice(0, CHUNK_SIZE);
                        audioBuffer = audioBuffer.slice(CHUNK_SIZE);
                        sendAudioChunk(chunk);
                    }
                };

                // Connect mic to processor
                const micSource = audioContext.createMediaStreamSource(mediaStream);
                micSource.connect(processor);
                processor.connect(audioContext.destination);

                // Resume audio context (required for autoplay policy)
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                currentMode = 'live';
                demoBtn.classList.add('active');
                demoBtn.textContent = 'Live: Mic';
                status.textContent = 'Live: Mic';
                status.classList.add('live');
                status.classList.remove('processing');
                demoBtn.classList.remove('loading');
                updateDebug('麦克风已连接');

            } catch (error) {
                console.error('Mic mode failed:', error);
                let errorMsg = '麦克风访问失败: ' + error.message;
                if (error.name === 'NotFoundError' || error.name === 'DevicesNotFoundError') {
                    errorMsg = '未找到麦克风设备，请检查是否连接了麦克风';
                } else if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
                    errorMsg = '麦克风权限被拒绝，请在浏览器中允许麦克风访问';
                } else if (error.name === 'OverconstrainedError') {
                    errorMsg = '麦克风不支持请求的音频配置';
                }
                updateDebug(errorMsg);
                currentMode = 'demo';
                demoBtn.classList.remove('active');
                demoBtn.textContent = 'Demo Mode';
            }
        }

        // Send audio chunk to backend
        async function sendAudioChunk(float32Data) {
            if (isProcessing) return;
            isProcessing = true;

            try {
                status.textContent = 'Processing...';
                status.classList.add('processing');

                // Convert float32 to WAV bytes
                const wavBytes = float32ToWav(float32Data, SAMPLE_RATE);

                console.log('Sending audio chunk:', float32Data.length, 'samples');

                const response = await fetch('/audio', {
                    method: 'POST',
                    body: wavBytes,
                    headers: {
                        'Content-Type': 'audio/wav'
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to process audio: ' + response.status);
                }

                const result = await response.json();
                console.log('ASR result:', result);

                if (result.en) {
                    addCaptions(result.en, result.zh || '');
                    updateDebug(`识别: "${result.en}" → 翻译: "${result.zh || ''}"`);
                } else if (result.error) {
                    updateDebug('错误: ' + result.error);
                }

                status.textContent = currentMode === 'live' ?
                    (mediaStream ? 'Live: Mic' : 'Live: NPR') : 'Demo Mode';
                status.classList.remove('processing');
                status.classList.add('live');

            } catch (error) {
                console.error('Audio processing error:', error);
                status.textContent = 'Error';
                updateDebug('Error: ' + error.message);
            } finally {
                isProcessing = false;
            }
        }

        // Convert float32 PCM to WAV format
        function float32ToWav(float32Data, sampleRate) {
            const numSamples = float32Data.length;
            const byteRate = sampleRate * 2;
            const blockAlign = 2;

            const buffer = new ArrayBuffer(44 + numSamples * 2);
            const view = new DataView(buffer);

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + numSamples * 2, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, numSamples * 2, true);

            let offset = 44;
            for (let i = 0; i < numSamples; i++) {
                const sample = Math.max(-1, Math.min(1, float32Data[i]));
                const intSample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                view.setInt16(offset, intSample, true);
                offset += 2;
            }

            return buffer;
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        // Stop live mode
        function stopLiveMode() {
            currentMode = 'demo';

            // Stop mic if active
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }

            // Stop audio processing
            if (processor) {
                processor.disconnect();
                processor = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }

            // Stop NPR audio if playing
            if (hiddenAudio) {
                hiddenAudio.pause();
                if (hiddenAudio.src !== '') {
                    hiddenAudio.src = '';
                }
            }

            audioBuffer = [];
            demoBtn.classList.remove('active');
            demoBtn.textContent = 'Demo Mode';
            updateDebug('');
            status.textContent = 'Demo Mode';
            status.classList.remove('live', 'processing');
        }

        // Toggle button handler
        demoBtn.addEventListener('click', async () => {
            if (currentMode === 'live') {
                stopLiveMode();
            } else {
                // Ask user to choose mode
                const useMic = confirm('使用麥克風？\n\n確定 = 麥克風模式\n取消 = 廣播演示模式');
                if (useMic) {
                    await startMicMode();
                } else {
                    await startLiveMode();
                }
            }
        });

        // Default: show ready state, wait for user click
        status.textContent = 'Ready - Click to Start';
    </script>
</body>
</html>
