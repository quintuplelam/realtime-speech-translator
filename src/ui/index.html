<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCST - 即時字幕</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --text-primary: #f5f5f5;
            --accent-gold: #d4af37;
            --font-display: 'Playfair Display', serif;
            --font-body: 'Noto Sans SC', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: var(--font-display);
            font-size: 1.25rem;
            color: var(--accent-gold);
        }
        .header-right { display: flex; align-items: center; gap: 1rem; }
        .status { font-size: 0.75rem; color: #666; }
        .status.live { color: #4ade80; }
        .status.error { color: #f87171; }
        .start-btn {
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 0.5rem 1.5rem;
            border-radius: 4px;
            font-size: 0.875rem;
            font-family: var(--font-body);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .start-btn:hover { background: rgba(212, 175, 55, 0.1); }
        .start-btn.active { background: var(--accent-gold); color: var(--bg-primary); }
        .caption-container {
            flex: 1;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: stretch;
            padding: 2rem;
            gap: 2rem;
            height: calc(100vh - 80px);
        }
        .caption-box {
            flex: 1;
            max-width: 50%;
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 2rem;
            border-top: 2px solid var(--accent-gold);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .caption-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--accent-gold);
            margin-bottom: 0.75rem;
            flex-shrink: 0;
        }
        .caption-history {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .caption-entry {
            font-size: 1.5rem;
            line-height: 1.4;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .caption-entry.fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .debug-info {
            position: fixed;
            bottom: 1rem;
            left: 1rem;
            font-size: 0.65rem;
            color: #444;
            font-family: monospace;
        }
        .mode-select {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-secondary);
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid var(--accent-gold);
            z-index: 100;
        }
        .mode-select h3 { color: var(--accent-gold); margin-bottom: 1rem; }
        .mode-select button {
            display: block;
            width: 100%;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            cursor: pointer;
            border-radius: 4px;
        }
        .mode-select button:hover { background: rgba(212, 175, 55, 0.2); }
        .hidden-audio { display: none; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">RCST</div>
        <div class="header-right">
            <div class="status" id="status">Ready</div>
            <button class="start-btn" id="startBtn">Start Demo</button>
        </div>
    </header>

    <!-- Hidden audio for playback -->
    <audio id="playbackAudio" class="hidden-audio" controls></audio>

    <!-- Mode selection popup -->
    <div class="mode-select" id="modeSelect">
        <h3>選擇模式</h3>
        <button id="micModeBtn">🎤 麥克風模式</button>
        <button id="streamModeBtn">📻 廣播模式 (NPR)</button>
    </div>

    <main class="caption-container">
        <div class="caption-box">
            <div class="caption-label">English</div>
            <div class="caption-history" id="enHistory"></div>
        </div>
        <div class="caption-box">
            <div class="caption-label">中文翻譯</div>
            <div class="caption-history" id="zhHistory"></div>
        </div>
    </main>

    <div class="debug-info" id="debugInfo"></div>

    <script>
        // DOM elements
        const startBtn = document.getElementById('startBtn');
        const status = document.getElementById('status');
        const modeSelect = document.getElementById('modeSelect');
        const micModeBtn = document.getElementById('micModeBtn');
        const streamModeBtn = document.getElementById('streamModeBtn');
        const playbackAudio = document.getElementById('playbackAudio');
        const enHistory = document.getElementById('enHistory');
        const zhHistory = document.getElementById('zhHistory');
        const debugInfo = document.getElementById('debugInfo');

        // State
        let audioContext = null;
        let processor = null;
        let mediaStream = null;
        let audioBuffer = [];
        let isRunning = false;
        const SAMPLE_RATE = 16000;
        const CHUNK_DURATION_MS = 6000;  // 6 seconds for complete sentences
        const CHUNK_SIZE = Math.floor(SAMPLE_RATE * CHUNK_DURATION_MS / 1000);

        function updateDebug(msg) {
            debugInfo.textContent = msg;
        }

        function prependCaption(historyEl, text) {
            const entry = document.createElement('div');
            entry.className = 'caption-entry fade-in';
            entry.textContent = text;
            historyEl.prepend(entry);
        }

        function addCaptions(en, zh) {
            if (en) prependCaption(enHistory, en);
            if (zh) prependCaption(zhHistory, zh);
        }

        function showModeSelect() {
            modeSelect.style.display = 'block';
        }

        function hideModeSelect() {
            modeSelect.style.display = 'none';
        }

        function stopCapture() {
            isRunning = false;

            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }

            if (processor) {
                processor.disconnect();
                processor = null;
            }

            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }

            audioBuffer = [];
            startBtn.classList.remove('active');
            startBtn.textContent = 'Start Demo';
            status.textContent = 'Stopped';
            status.classList.remove('live');
        }

        async function startMicMode() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new AudioContext();
                processor = audioContext.createScriptProcessor(4096, 1, 1);
                audioBuffer = [];

                processor.onaudioprocess = (e) => {
                    if (!isRunning) return;
                    const inputData = e.inputBuffer.getChannelData(0);
                    for (let i = 0; i < inputData.length; i++) {
                        audioBuffer.push(inputData[i]);
                    }
                    if (audioBuffer.length >= CHUNK_SIZE) {
                        sendChunk();
                    }
                };

                processor.connect(audioContext.destination);
                isRunning = true;
                status.textContent = 'Live: Mic';
                status.classList.add('live');
                updateDebug('麥克風已連接');
            } catch (error) {
                console.error('Mic error:', error);
                updateDebug('麥克風錯誤: ' + error.message);
                stopCapture();
            }
        }

        async function startStreamMode() {
            const NPR_URL = '/proxy/npr';
            try {
                audioContext = new AudioContext();
                processor = audioContext.createScriptProcessor(4096, 1, 1);
                audioBuffer = [];

                // Create audio element for stream
                const audioEl = document.createElement('audio');
                audioEl.src = NPR_URL;
                audioEl.crossOrigin = 'anonymous';
                audioEl.loop = true;

                await new Promise((resolve, reject) => {
                    audioEl.oncanplaythrough = resolve;
                    audioEl.onerror = reject;
                    audioEl.load();
                });

                const source = audioContext.createMediaElementSource(audioEl);
                source.connect(processor);
                processor.connect(audioContext.destination);
                await audioEl.play();

                processor.onaudioprocess = (e) => {
                    if (!isRunning) return;
                    const inputData = e.inputBuffer.getChannelData(0);
                    for (let i = 0; i < inputData.length; i++) {
                        audioBuffer.push(inputData[i]);
                    }
                    if (audioBuffer.length >= CHUNK_SIZE) {
                        sendChunk();
                    }
                };

                isRunning = true;
                status.textContent = 'Live: NPR';
                status.classList.add('live');
                updateDebug('NPR 廣播已開始');
            } catch (error) {
                console.error('Stream error:', error);
                updateDebug('廣播錯誤: ' + error.message);
                stopCapture();
            }
        }

        function float32ToWav(float32Data, sampleRate) {
            const numSamples = float32Data.length;
            const byteRate = sampleRate * 2;
            const buffer = new ArrayBuffer(44 + numSamples * 2);
            const view = new DataView(buffer);

            // RIFF header
            view.setUint8(0, 'R'.charCodeAt(0));
            view.setUint8(1, 'I'.charCodeAt(0));
            view.setUint8(2, 'F'.charCodeAt(0));
            view.setUint8(3, 'F'.charCodeAt(0));
            view.setUint32(4, 36 + numSamples * 2, true);
            view.setUint8(8, 'W'.charCodeAt(0));
            view.setUint8(9, 'A'.charCodeAt(0));
            view.setUint8(10, 'V'.charCodeAt(0));
            view.setUint8(11, 'E'.charCodeAt(0));
            view.setUint8(12, 'f'.charCodeAt(0));
            view.setUint8(13, 'm'.charCodeAt(0));
            view.setUint8(14, 't'.charCodeAt(0));
            view.setUint8(15, ' '.charCodeAt(0));
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            view.setUint8(36, 'd'.charCodeAt(0));
            view.setUint8(37, 'a'.charCodeAt(0));
            view.setUint8(38, 't'.charCodeAt(0));
            view.setUint8(39, 'a'.charCodeAt(0));
            view.setUint32(40, numSamples * 2, true);

            let offset = 44;
            for (let i = 0; i < numSamples; i++) {
                const sample = Math.max(-1, Math.min(1, float32Data[i]));
                const intSample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                view.setInt16(offset, intSample, true);
                offset += 2;
            }
            return buffer;
        }

        function sendChunk() {
            const chunk = audioBuffer.slice(0, CHUNK_SIZE);
            audioBuffer = audioBuffer.slice(CHUNK_SIZE);

            const actualRate = audioContext ? audioContext.sampleRate : SAMPLE_RATE;
            const wavBytes = float32ToWav(chunk, actualRate);

            status.textContent = 'Processing...';

            fetch('/audio', {
                method: 'POST',
                body: wavBytes,
                headers: { 'Content-Type': 'audio/wav' }
            })
            .then(r => r.json())
            .then(result => {
                if (result.en && result.en.trim()) {
                    addCaptions(result.en, result.zh || '');
                    updateDebug(`"${result.en}" → "${result.zh || ''}"`);

                    // Play back audio for user to hear
                    const blob = new Blob([wavBytes], { type: 'audio/wav' });
                    const url = URL.createObjectURL(blob);
                    playbackAudio.src = url;
                    playbackAudio.play().catch(() => {});
                } else if (result.error) {
                    updateDebug('Error: ' + result.error);
                } else {
                    updateDebug('未識別到語音');
                }
                status.textContent = isRunning ? status.textContent : 'Stopped';
            })
            .catch(err => {
                console.error('Audio error:', err);
                updateDebug('Error: ' + err.message);
            });
        }

        // Event listeners
        startBtn.addEventListener('click', () => {
            if (isRunning) {
                stopCapture();
            } else {
                showModeSelect();
            }
        });

        micModeBtn.addEventListener('click', async () => {
            hideModeSelect();
            startBtn.classList.add('active');
            startBtn.textContent = 'Stop';
            await startMicMode();
        });

        streamModeBtn.addEventListener('click', async () => {
            hideModeSelect();
            startBtn.classList.add('active');
            startBtn.textContent = 'Stop';
            await startStreamMode();
        });

        status.textContent = 'Ready - Click Start';
    </script>
</body>
</html>
