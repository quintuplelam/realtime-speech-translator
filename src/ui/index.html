<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCST - 即時字幕</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --text-primary: #f5f5f5;
            --accent-gold: #d4af37;
            --font-display: 'Playfair Display', serif;
            --font-body: 'Noto Sans SC', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: var(--font-display);
            font-size: 1.25rem;
            color: var(--accent-gold);
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .status { font-size: 0.75rem; color: #666; }
        .status.live { color: #4ade80; }
        .status.processing { color: #f59e0b; }
        .demo-btn {
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-family: var(--font-body);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .demo-btn:hover { background: rgba(212, 175, 55, 0.1); }
        .demo-btn.active { background: var(--accent-gold); color: var(--bg-primary); }
        .demo-btn.loading { opacity: 0.5; cursor: not-allowed; }
        .caption-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            gap: 1rem;
        }
        .caption-box {
            width: 100%;
            max-width: 1400px;
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 2.5rem 4rem;
            border-top: 2px solid var(--accent-gold);
        }
        .caption-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--accent-gold);
            margin-bottom: 0.75rem;
        }
        .caption-text {
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 1.4;
            min-height: 1.4em;
        }
        .caption-text.fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Hidden audio elements */
        #audioPlayer { display: none; }
        #hiddenAudio { display: none; }
        .debug-info {
            position: fixed;
            bottom: 1rem;
            left: 1rem;
            font-size: 0.65rem;
            color: #444;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">RCST</div>
        <div class="header-right">
            <div class="status" id="status">Ready</div>
            <button class="demo-btn" id="demoBtn">Demo Mode</button>
        </div>
    </header>

    <!-- Hidden audio player for NPR stream -->
    <audio id="audioPlayer" controls></audio>
    <!-- Hidden audio for audio context -->
    <audio id="hiddenAudio" crossorigin="anonymous"></audio>

    <main class="caption-container">
        <div class="caption-box">
            <div class="caption-label">English</div>
            <div class="caption-text" id="enText"></div>
        </div>
        <div class="caption-box">
            <div class="caption-label">中文翻譯</div>
            <div class="caption-text" id="zhText"></div>
        </div>
    </main>

    <div class="debug-info" id="debugInfo"></div>

    <script>
        const NPR_STREAM_URL = 'https://npr-ice.streamguys1.com/live.mp3';
        const enText = document.getElementById('enText');
        const zhText = document.getElementById('zhText');
        const status = document.getElementById('status');
        const demoBtn = document.getElementById('demoBtn');
        const audioPlayer = document.getElementById('audioPlayer');
        const hiddenAudio = document.getElementById('hiddenAudio');
        const debugInfo = document.getElementById('debugInfo');

        let eventSource = null;
        let currentMode = 'demo'; // 'demo' or 'live'
        let audioContext = null;
        let processor = null;
        let sourceNode = null;
        let mediaStream = null;
        let isProcessing = false;
        let audioBuffer = [];

        const SAMPLE_RATE = 16000;
        const CHUNK_DURATION_MS = 3000;
        const CHUNK_SIZE = Math.floor(SAMPLE_RATE * CHUNK_DURATION_MS / 1000);

        function updateDebug(msg) {
            debugInfo.textContent = msg;
        }

        // Connect to demo SSE
        function connectDemoSSE() {
            if (eventSource) {
                eventSource.close();
            }

            status.textContent = 'Demo Mode';
            demoBtn.classList.add('loading');

            eventSource = new EventSource('/stream');

            eventSource.addEventListener('caption', (event) => {
                const data = JSON.parse(event.data);
                animateText(enText, data.en);
                animateText(zhText, data.zh);
                status.textContent = 'Demo Mode';
                status.classList.add('live');
                demoBtn.classList.remove('loading');
            });

            eventSource.onerror = () => {
                status.textContent = 'Reconnecting...';
                demoBtn.classList.add('loading');
                setTimeout(connectDemoSSE, 3000);
            };
        }

        function animateText(el, text) {
            el.classList.remove('fade-in');
            void el.offsetWidth;
            el.classList.add('fade-in');
            el.textContent = text;
        }

        // Start live NPR mode with audio capture
        async function startLiveMode() {
            try {
                // Start audio playback using hidden audio element
                hiddenAudio.src = NPR_STREAM_URL;
                hiddenAudio.crossOrigin = 'anonymous';

                await hiddenAudio.play();

                // Create audio context
                audioContext = new (window.AudioContext || window.webkitAudioContext)();

                // Create stream from audio element
                const stream = hiddenAudio.captureStream ? hiddenAudio.captureStream() : audioContext.createMediaStreamSource(hiddenAudio);
                mediaStream = stream;

                // Create script processor for audio capture
                processor = audioContext.createScriptProcessor(4096, 1, 1);
                sourceNode = audioContext.createMediaStreamSource(stream);
                sourceNode.connect(processor);
                processor.connect(audioContext.destination);

                audioBuffer = [];

                processor.onaudioprocess = (e) => {
                    if (currentMode !== 'live' || isProcessing) return;

                    const inputData = e.inputBuffer.getChannelData(0);

                    // Convert float32 to int16 PCM and add to buffer
                    for (let i = 0; i < inputData.length; i++) {
                        audioBuffer.push(inputData[i]);
                    }

                    // When we have enough samples, send to backend
                    if (audioBuffer.length >= CHUNK_SIZE) {
                        const chunk = audioBuffer.slice(0, CHUNK_SIZE);
                        audioBuffer = audioBuffer.slice(CHUNK_SIZE);

                        sendAudioChunk(chunk);
                    }
                };

                currentMode = 'live';
                demoBtn.classList.add('active');
                demoBtn.textContent = 'Live: NPR';
                status.textContent = 'Live: NPR';
                status.classList.add('live');
                status.classList.remove('processing');
                demoBtn.classList.remove('loading');

            } catch (error) {
                console.error('Failed to start live mode:', error);
                status.textContent = 'Error: ' + error.message;
                demoBtn.classList.remove('loading');
                // Fallback to demo mode
                currentMode = 'demo';
                demoBtn.classList.remove('active');
                demoBtn.textContent = 'Demo Mode';
                connectDemoSSE();
            }
        }

        // Send audio chunk to backend
        async function sendAudioChunk(float32Data) {
            if (isProcessing) return;
            isProcessing = true;

            try {
                status.textContent = 'Processing...';
                status.classList.add('processing');

                // Convert float32 to WAV bytes
                const wavBytes = float32ToWav(float32Data, SAMPLE_RATE);

                const response = await fetch('/audio', {
                    method: 'POST',
                    body: wavBytes,
                    headers: {
                        'Content-Type': 'audio/wav'
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to process audio');
                }

                const result = await response.json();

                if (result.en) {
                    animateText(enText, result.en);
                    animateText(zhText, result.zh);
                    updateDebug(`Sent ${float32Data.length} samples, got: "${result.en}"`);
                }

                status.textContent = 'Live: NPR';
                status.classList.remove('processing');
                status.classList.add('live');

            } catch (error) {
                console.error('Audio processing error:', error);
                status.textContent = 'Error';
                updateDebug('Error: ' + error.message);
            } finally {
                isProcessing = false;
            }
        }

        // Convert float32 PCM to WAV format
        function float32ToWav(float32Data, sampleRate) {
            const numSamples = float32Data.length;
            const byteRate = sampleRate * 2; // 16-bit = 2 bytes per sample
            const blockAlign = 2; // 16-bit mono

            const buffer = new ArrayBuffer(44 + numSamples * 2);
            const view = new DataView(buffer);

            // WAV header
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + numSamples * 2, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true); // Subchunk1Size
            view.setUint16(20, 1, true); // AudioFormat (PCM)
            view.setUint16(22, 1, true); // NumChannels (mono)
            view.setUint32(24, sampleRate, true); // SampleRate
            view.setUint32(28, byteRate, true); // ByteRate
            view.setUint16(32, blockAlign, true); // BlockAlign
            view.setUint16(34, 16, true); // BitsPerSample
            writeString(view, 36, 'data');
            view.setUint32(40, numSamples * 2, true); // Subchunk2Size

            // PCM data
            let offset = 44;
            for (let i = 0; i < numSamples; i++) {
                const sample = Math.max(-1, Math.min(1, float32Data[i]));
                const intSample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                view.setInt16(offset, intSample, true);
                offset += 2;
            }

            return buffer;
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        // Stop live mode
        function stopLiveMode() {
            currentMode = 'demo';

            // Stop audio processing
            if (processor) {
                processor.disconnect();
                processor = null;
            }
            if (sourceNode) {
                sourceNode.disconnect();
                sourceNode = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }

            hiddenAudio.pause();
            hiddenAudio.src = '';

            demoBtn.classList.remove('active');
            demoBtn.textContent = 'Demo Mode';
            status.textContent = 'Demo Mode';
            status.classList.remove('live', 'processing');
            updateDebug('');
        }

        // Toggle button handler
        demoBtn.addEventListener('click', async () => {
            if (currentMode === 'live') {
                stopLiveMode();
                connectDemoSSE();
            } else {
                await startLiveMode();
            }
        });

        // Default: connect to demo stream
        connectDemoSSE();
    </script>
</body>
</html>
